spring:
  application:
    name: iot-server-service
  config:
    import: optional:configserver:http://localhost:8888

agms:
  iot:
    jwt:
      secret: ${AGMS_IOT_JWT_SECRET:change-this-default-secret-for-dev-only}
      access-expiration-seconds: 900
      refresh-expiration-seconds: 604800
    seed-user:
      username: ${AGMS_IOT_USERNAME:agms_user}
      password: ${AGMS_IOT_PASSWORD:123456}
