server:
  port: 8085

spring:
  datasource:
    url: ${AGMS_MYSQL_URL:jdbc:mysql://localhost:3306/agms_iot?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AGMS_MYSQL_USERNAME:root}
    password: ${AGMS_MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

agms:
  iot:
    jwt:
      secret: ${AGMS_IOT_JWT_SECRET:change-this-default-secret-for-dev-only}
      access-expiration-seconds: 900
      refresh-expiration-seconds: 604800
    seed-user:
      username: ${AGMS_IOT_USERNAME:agms_user}
      password: ${AGMS_IOT_PASSWORD:123456}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
