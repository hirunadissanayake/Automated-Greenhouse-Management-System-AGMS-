server:
  port: 8084

spring:
  datasource:
    url: ${AGMS_MYSQL_URL:jdbc:mysql://localhost:3306/agms_iot?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AGMS_MYSQL_USERNAME:root}
    password: ${AGMS_MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
