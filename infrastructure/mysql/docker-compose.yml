services:
  agms-mysql:
    image: mysql:8.4
    container_name: agms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agms_iot
      MYSQL_USER: agms
      MYSQL_PASSWORD: agms123
    ports:
      - "3306:3306"
    volumes:
      - agms_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  agms_mysql_data:
