server:
  port: 8080

spring:
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - X-Auth-Error
            allowCredentials: false
      routes:
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**
        - id: sensor-telemetry-service
          uri: lb://sensor-telemetry-service
          predicates:
            - Path=/api/sensors/**
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/automation/**
        - id: crop-inventory-service
          uri: lb://crop-inventory-service
          predicates:
            - Path=/api/crops/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
